<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="cyan-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    <linearGradient id="purple-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0b1120" />
      <stop offset="100%" stop-color="#050814" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" stroke="rgba(0, 242, 254, 0.15)" stroke-width="8" />
  
  <!-- Quantum orbits -->
  <g transform="translate(256, 256)">
    <!-- Orbit 1 -->
    <ellipse rx="200" ry="70" fill="none" stroke="url(#cyan-blue)" stroke-width="12" transform="rotate(30)" opacity="0.8" />
    <!-- Orbit 2 -->
    <ellipse rx="200" ry="70" fill="none" stroke="url(#purple-pink)" stroke-width="12" transform="rotate(-30)" opacity="0.8" />
    <!-- Orbit 3 -->
    <ellipse rx="200" ry="70" fill="none" stroke="url(#cyan-blue)" stroke-width="12" transform="rotate(90)" opacity="0.6" />
    
    <!-- Nucleus / Center Atom -->
    <circle r="40" fill="url(#cyan-blue)" />
    
    <!-- Electrons / Orbiting particles -->
    <circle cx="173" cy="100" r="14" fill="#00f2fe" />
    <circle cx="-173" cy="-100" r="14" fill="#ec4899" />
    <circle cx="0" cy="-200" r="14" fill="#a855f7" />
  </g>
</svg>
